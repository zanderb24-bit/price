<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Console</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#121212;
    color:white;
}

/* Layout container */

.dashboard{
    display:grid;
    grid-template-columns:250px 1fr;
    grid-template-rows:60px 1fr;
    height:100vh;
}

/* Header */

header{
    grid-column:1 / span 2;
    background:#1e1e1e;
    display:flex;
    align-items:center;
    padding-left:20px;
    border-bottom:2px solid orange;
}

/* Sidebar */

.sidebar{
    background:#1a1a1a;
    padding:60px;
}

.sidebar h2{
    color:orange;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
}

.sidebar a:hover{
    color:orange;
}

/* Main content */

main{
    padding:20px;
}

/* Cards */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-left:4px solid orange;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="dashboard">

<header>
<h1>My Dashboard</h1>
</header>

<div class="sidebar">
<h2>Menu</h2>

<a href="#">Home</a>
<a href="#">Analytics</a>
<a href="#">Projects</a>
<a href="#">Settings</a>

</div>

<main>

<h2>Overview</h2>
<p id="price-updated-at">Last updated: --</p>

<div class="cards">

<div class="card">
<h3>Bitcoin</h3>
<p id="bitcoin-price">Loading...</p>
</div>

<div class="card">
<h3>Gold</h3>
<p id="gold-price">Loading...</p>
</div>

<div class="card">
<h3>Active Sessions</h3>
<p>89</p>
</div>

</div>

</main>

</div>

<script type="module">
import { loadLivePrices } from './price-feed.js';

loadLivePrices({
  bitcoinSelector: '#bitcoin-price',
  goldSelector: '#gold-price',
  updatedAtSelector: '#price-updated-at',
  refreshMs: 30000
});
</script>

</body>
</html>
