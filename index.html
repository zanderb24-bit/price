<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Price Tracker</title>
  <style>
    :root {
      --bg: #120b07;
      --bg-scan: rgba(255, 138, 0, 0.06);
      --card: #1f130c;
      --panel: #2b1a10;
      --text: #ffe7c2;
      --muted: #f4b36b;
      --accent: #ff8a00;
      --accent-soft: #ffb04d;
      --ok: #ffca7a;
      --warn: #ff9c2f;
      --err: #ff6b57;
      --border: #ff8a00;
      --shadow: 0 0 0 2px #6b3a12, 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Courier New", "Lucida Console", Monaco, monospace;
      color: var(--text);
      background:
        repeating-linear-gradient(
          180deg,
          var(--bg-scan) 0,
          var(--bg-scan) 1px,
          transparent 1px,
          transparent 4px
        ),
        radial-gradient(circle at 20% 15%, #3b210f 0%, #1f1209 35%, var(--bg) 75%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(860px, 100%);
      position: relative;
      padding-left: 54px;
    }

    .card-wrap {
      position: relative;
    }

    .side-tabs {
      position: absolute;
      left: -54px;
      top: 22px;
      display: grid;
      gap: 10px;
      z-index: 2;
    }

    .tab {
      width: 54px;
      height: 34px;
      border: 3px solid var(--border);
      border-right: 0;
      background: linear-gradient(180deg, #3d2413 0%, #2b180d 100%);
      box-shadow: 0 0 0 2px #6b3a12;
      border-radius: 6px 0 0 6px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--card) 100%);
      border: 3px solid var(--border);
      border-radius: 0;
      box-shadow: var(--shadow);
      padding: 32px;
      position: relative;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(255, 176, 77, 0.45);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.1rem, 2.4vw, 1.55rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-soft);
      text-shadow: 0 0 8px rgba(255, 138, 0, 0.35);
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.03em;
    }

    .price {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.9rem);
      line-height: 1.06;
      font-weight: 800;
      letter-spacing: 0.01em;
      word-break: break-word;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255, 138, 0, 0.35);
    }


    .graph-wrap {
      margin-top: 18px;
      padding: 14px;
      border: 2px solid rgba(255, 138, 0, 0.55);
      background: linear-gradient(180deg, rgba(34, 20, 11, 0.9) 0%, rgba(22, 13, 8, 0.95) 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 176, 77, 0.28);
    }

    .graph-title {
      margin: 0 0 8px;
      color: var(--accent-soft);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .graph-widget {
      width: 100%;
      height: clamp(240px, 38vh, 360px);
      border: 1px dashed rgba(255, 176, 77, 0.45);
      background: rgba(14, 8, 5, 0.7);
      overflow: hidden;
      position: relative;
    }

    .graph-widget > div,
    .graph-widget iframe {
      width: 100% !important;
      height: 100% !important;
    }

    .graph-footnote {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .meta {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.93rem;
      display: grid;
      gap: 8px;
      border-top: 1px solid rgba(255, 138, 0, 0.45);
      padding-top: 16px;
    }

    .label {
      font-weight: 700;
      color: var(--accent-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.82em;
    }

    .status {
      font-weight: 700;
    }

    .status.live {
      color: var(--ok);
    }

    .status.updating {
      color: var(--warn);
    }

    .status.error {
      color: var(--err);
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 2px solid #ffd6a1;
      border-radius: 0;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ff9d2e 0%, #e56d00 100%);
      color: #2b1406;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
      box-shadow: 3px 3px 0 #7d3e10;
    }

    button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 1px 1px 0 #7d3e10;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    .note {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.84rem;
      letter-spacing: 0.02em;
      border-left: 3px solid rgba(255, 138, 0, 0.55);
      padding-left: 10px;
    }

    @media (max-width: 720px) {
      .container {
        padding-left: 44px;
      }

      .side-tabs {
        left: -44px;
      }

      .tab {
        width: 44px;
        height: 30px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding-left: 34px;
      }

      .side-tabs {
        left: -34px;
      }

      .tab {
        width: 34px;
        height: 26px;
      }

      .card {
        padding: 20px;
      }

      .card::after {
        inset: 7px;
      }

      .graph-widget {
        height: 230px;
      }

      .note {
        font-size: 0.8rem;
      }
    }

  </style>
</head>
<body>
  <main class="container">
    <div class="card-wrap">
      <aside class="side-tabs" aria-label="Placeholder graph tabs">
        <div class="tab" aria-hidden="true"></div>
        <div class="tab" aria-hidden="true"></div>
        <div class="tab" aria-hidden="true"></div>
        <div class="tab" aria-hidden="true"></div>
      </aside>

      <section class="card" aria-live="polite">
        <h1>Bitcoin (BTC) Price</h1>
        <p class="subtitle">Real-time spot price in USD</p>

        <p id="price" class="price">—</p>

        <section class="graph-wrap" aria-label="Daily price chart">
          <p class="graph-title">Daily chart (TradingView)</p>
          <div id="tvChart" class="graph-widget" role="img" aria-label="Bitcoin daily TradingView chart"></div>
          <p class="graph-footnote">Chart source: TradingView (daily interval).</p>
        </section>

        <div class="meta">
          <div><span class="label">Source:</span> <span id="source">—</span></div>
          <div><span class="label">Last updated:</span> <span id="updated">—</span></div>
          <div><span class="label">Status:</span> <span id="status" class="status updating">Waiting for first update…</span></div>
        </div>

        <div class="actions">
          <button id="refreshBtn" type="button">Refresh now</button>
        </div>

        <p class="note">Auto-refresh every 30 seconds. On errors, retries use exponential backoff.</p>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const priceEl = document.getElementById('price');
      const sourceEl = document.getElementById('source');
      const updatedEl = document.getElementById('updated');
      const statusEl = document.getElementById('status');
      const refreshBtn = document.getElementById('refreshBtn');

      const NORMAL_REFRESH_MS = 30_000;
      const BASE_BACKOFF_MS = 5_000;
      const MAX_BACKOFF_MS = 60_000;

      let retryCount = 0;
      let timerId = null;
      let isUpdating = false;
      let lastKnownPrice = null;

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + (type || 'updating');
      }

      function formatUSD(amount) {
        return new Intl.NumberFormat(undefined, {
          style: 'currency',
          currency: 'USD',
          maximumFractionDigits: 2
        }).format(amount);
      }

      function updateTimestamp(date) {
        updatedEl.textContent = new Intl.DateTimeFormat(undefined, {
          dateStyle: 'medium',
          timeStyle: 'medium'
        }).format(date);
      }

      async function fetchFromCoinbase() {
        const response = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot', {
          cache: 'no-store'
        });
        if (!response.ok) {
          throw new Error('Coinbase HTTP ' + response.status);
        }

        const json = await response.json();
        const amount = Number(json && json.data && json.data.amount);
        if (!Number.isFinite(amount)) {
          throw new Error('Coinbase returned invalid price data');
        }

        return { amount, source: 'Coinbase' };
      }

      async function fetchFromCoinGecko() {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd', {
          cache: 'no-store'
        });
        if (!response.ok) {
          throw new Error('CoinGecko HTTP ' + response.status);
        }

        const json = await response.json();
        const amount = Number(json && json.bitcoin && json.bitcoin.usd);
        if (!Number.isFinite(amount)) {
          throw new Error('CoinGecko returned invalid price data');
        }

        return { amount, source: 'CoinGecko' };
      }

      function scheduleNext(ms) {
        clearTimeout(timerId);
        timerId = setTimeout(refreshPrice, ms);
      }

      function getBackoffDelay() {
        return Math.min(BASE_BACKOFF_MS * Math.pow(2, Math.max(0, retryCount - 1)), MAX_BACKOFF_MS);
      }

      async function refreshPrice() {
        if (isUpdating) {
          return;
        }
        isUpdating = true;
        refreshBtn.disabled = true;

        setStatus('Updating…', 'updating');

        try {
          let result;
          try {
            result = await fetchFromCoinbase();
          } catch (coinbaseError) {
            try {
              result = await fetchFromCoinGecko();
            } catch (coingeckoError) {
              throw new Error(coinbaseError.message + '; fallback failed: ' + coingeckoError.message);
            }
          }

          lastKnownPrice = result.amount;
          priceEl.textContent = formatUSD(result.amount);
          sourceEl.textContent = result.source;
          updateTimestamp(new Date());

          retryCount = 0;
          setStatus('Live', 'live');
          scheduleNext(NORMAL_REFRESH_MS);
        } catch (error) {
          retryCount += 1;
          if (lastKnownPrice !== null) {
            priceEl.textContent = formatUSD(lastKnownPrice);
          }
          const delay = getBackoffDelay();
          setStatus('Error: ' + error.message + '. Retrying in ' + Math.round(delay / 1000) + 's', 'error');
          scheduleNext(delay);
        } finally {
          refreshBtn.disabled = false;
          isUpdating = false;
        }
      }


      function initTradingViewChart() {
        const existing = document.getElementById('tradingview-widget-script');
        if (existing) {
          return;
        }

        const script = document.createElement('script');
        script.id = 'tradingview-widget-script';
        script.src = 'https://s3.tradingview.com/tv.js';
        script.async = true;
        script.onload = function () {
          if (window.TradingView && typeof window.TradingView.widget === 'function') {
            new window.TradingView.widget({
              container_id: 'tvChart',
              autosize: true,
              symbol: 'COINBASE:BTCUSD',
              interval: 'D',
              timezone: 'Etc/UTC',
              theme: 'dark',
              style: '1',
              locale: 'en',
              toolbar_bg: '#1f130c',
              enable_publishing: false,
              hide_top_toolbar: true,
              hide_legend: true,
              allow_symbol_change: false,
              withdateranges: false,
              range: '3M',
              hide_volume: true,
              save_image: false,
              studies: []
            });
          }
        };
        script.onerror = function () {
          const chart = document.getElementById('tvChart');
          if (chart) {
            chart.textContent = 'Unable to load TradingView chart right now.';
            chart.style.display = 'grid';
            chart.style.placeItems = 'center';
            chart.style.color = '#f4b36b';
            chart.style.padding = '12px';
          }
        };
        document.head.appendChild(script);
      }

      refreshBtn.addEventListener('click', () => {
        clearTimeout(timerId);
        refreshPrice();
      });

      initTradingViewChart();
      refreshPrice();
    })();
  </script>
</body>
</html>
