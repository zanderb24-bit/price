<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Tracker Dashboard</title>
  <style>
    :root {
      --bg: #120b07;
      --bg-scan: rgba(255, 138, 0, 0.06);
      --card: #1f130c;
      --panel: #2b1a10;
      --text: #ffe7c2;
      --muted: #f4b36b;
      --accent: #ff8a00;
      --accent-soft: #ffb04d;
      --ok: #ffca7a;
      --warn: #ff9c2f;
      --err: #ff6b57;
      --border: #ff8a00;
      --shadow: 0 0 0 2px #6b3a12, 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Courier New", "Lucida Console", Monaco, monospace;
      color: var(--text);
      background:
        repeating-linear-gradient(180deg, var(--bg-scan) 0, var(--bg-scan) 1px, transparent 1px, transparent 4px),
        radial-gradient(circle at 20% 15%, #3b210f 0%, #1f1209 35%, var(--bg) 75%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .container {
      width: 100vw;
      height: 100vh;
      position: relative;
      padding-left: 72px;
    }

    .card-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .side-tabs {
      position: absolute;
      left: -54px;
      top: 28px;
      display: grid;
      gap: 10px;
      z-index: 2;
    }

    .tab {
      width: 72px;
      min-height: 42px;
      border: 5px solid var(--border);
      border-right: 0;
      background: linear-gradient(180deg, #3d2413 0%, #2b180d 100%);
      box-shadow: 0 0 0 2px #6b3a12;
      border-radius: 6px 0 0 6px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      line-height: 1.2;
      padding: 6px 4px;
      cursor: pointer;
      text-align: center;
    }

    .tab.active {
      background: linear-gradient(180deg, #5a3319 0%, #3f2413 100%);
      color: var(--accent-soft);
      text-shadow: 0 0 8px rgba(255, 138, 0, 0.35);
    }

    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--card) 100%);
      border: 5px solid var(--border);
      border-radius: 0;
      box-shadow: var(--shadow);
      padding: 44px;
      min-height: 100vh;
      position: relative;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(255, 176, 77, 0.45);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.1rem, 2.4vw, 1.55rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-soft);
      text-shadow: 0 0 8px rgba(255, 138, 0, 0.35);
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.03em;
    }

    .price {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 6rem);
      line-height: 1.06;
      font-weight: 800;
      letter-spacing: 0.01em;
      word-break: break-word;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255, 138, 0, 0.35);
    }

    .graph-wrap {
      margin-top: 18px;
      padding: 14px;
      border: 2px solid rgba(255, 138, 0, 0.42);
      background: linear-gradient(180deg, rgba(41, 24, 13, 0.92) 0%, rgba(31, 19, 12, 0.96) 55%, rgba(27, 17, 11, 0.98) 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 176, 77, 0.18);
    }

    .graph-title {
      margin: 0 0 8px;
      color: var(--accent-soft);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .graph-widget {
      width: 100%;
      height: clamp(420px, 58vh, 760px);
      border: 1px dashed rgba(255, 176, 77, 0.28);
      background: radial-gradient(circle at top, rgba(57, 34, 20, 0.55) 0%, rgba(31, 19, 12, 0.95) 70%);
      overflow: hidden;
      position: relative;
    }

    .graph-widget > div,
    .graph-widget iframe {
      width: 100% !important;
      height: 100% !important;
    }

    .graph-footnote {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .meta {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.93rem;
      display: grid;
      gap: 8px;
      border-top: 1px solid rgba(255, 138, 0, 0.45);
      padding-top: 16px;
    }

    .label {
      font-weight: 700;
      color: var(--accent-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.82em;
    }

    .status { font-weight: 700; }
    .status.live { color: var(--ok); }
    .status.updating { color: var(--warn); }
    .status.error { color: var(--err); }

    .note {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.84rem;
      letter-spacing: 0.02em;
      border-left: 3px solid rgba(255, 138, 0, 0.55);
      padding-left: 10px;
    }

    @media (max-width: 720px) {
      .container { padding-left: 58px; }
      .side-tabs { left: -58px; }
      .tab { width: 58px; min-height: 36px; font-size: 0.62rem; }
    }

    @media (max-width: 480px) {
      .container { padding-left: 44px; }
      .side-tabs { left: -44px; }
      .tab { width: 44px; min-height: 30px; font-size: 0.56rem; padding: 4px 2px; }
      .card { padding: 26px; }
      .card::after { inset: 7px; }
      .graph-widget { height: 360px; }
      .note { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="card-wrap">
      <aside class="side-tabs" aria-label="Market tabs">
        <button class="tab active" id="tabBtc" type="button">BTC</button>
        <button class="tab" id="tabFx" type="button">USD/GBP</button>
        <button class="tab" type="button" aria-hidden="true"></button>
        <button class="tab" type="button" aria-hidden="true"></button>
      </aside>

      <section class="card" aria-live="polite">
        <h1 id="title">Bitcoin (BTC) Price</h1>
        <p id="subtitle" class="subtitle">Real-time spot price in USD</p>

        <p id="price" class="price">—</p>

        <section class="graph-wrap" aria-label="Price chart">
          <p id="graphTitle" class="graph-title">24H chart (TradingView)</p>
          <div id="tvChart" class="graph-widget" role="img" aria-label="TradingView chart"></div>
          <p id="graphFootnote" class="graph-footnote">Chart source: TradingView (24-hour range).</p>
        </section>

        <div class="meta">
          <div><span class="label">Source:</span> <span id="source">—</span></div>
          <div><span class="label">Last updated:</span> <span id="updated">—</span></div>
          <div><span class="label">Status:</span> <span id="status" class="status updating">Waiting for first update…</span></div>
        </div>

        <p class="note">Auto-refresh every 30 seconds. On errors, retries use exponential backoff.</p>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const priceEl = document.getElementById('price');
      const sourceEl = document.getElementById('source');
      const updatedEl = document.getElementById('updated');
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const subtitleEl = document.getElementById('subtitle');
      const graphTitleEl = document.getElementById('graphTitle');
      const graphFootnoteEl = document.getElementById('graphFootnote');
      const tvChartEl = document.getElementById('tvChart');
      const tabBtc = document.getElementById('tabBtc');
      const tabFx = document.getElementById('tabFx');

      const NORMAL_REFRESH_MS = 30_000;
      const BASE_BACKOFF_MS = 5_000;
      const MAX_BACKOFF_MS = 60_000;

      let retryCount = 0;
      let timerId = null;
      let isUpdating = false;
      let tradingViewReady = false;
      let activeView = 'btc';
      let lastKnown = {
        btc: null,
        fx: null
      };

      const views = {
        btc: {
          title: 'Bitcoin (BTC) Price',
          subtitle: 'Real-time spot price in USD',
          graphTitle: 'BTC 24H chart (TradingView)',
          graphFootnote: 'Chart source: TradingView (COINBASE:BTCUSD, 24-hour range).',
          tvSymbol: 'COINBASE:BTCUSD',
          format: (n) => new Intl.NumberFormat(undefined, { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(n)
        },
        fx: {
          title: 'USD/GBP Exchange Rate',
          subtitle: 'US Dollar to British Pound (live rate)',
          graphTitle: 'USD/GBP 24H chart (TradingView)',
          graphFootnote: 'Chart source: TradingView (FX_IDC:USDGBP, 24-hour range).',
          tvSymbol: 'FX_IDC:USDGBP',
          format: (n) => new Intl.NumberFormat(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 }).format(n) + ' GBP'
        }
      };

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + (type || 'updating');
      }

      function updateTimestamp(date) {
        updatedEl.textContent = new Intl.DateTimeFormat(undefined, {
          dateStyle: 'medium',
          timeStyle: 'medium'
        }).format(date);
      }

      function applyViewUI() {
        const cfg = views[activeView];
        titleEl.textContent = cfg.title;
        subtitleEl.textContent = cfg.subtitle;
        graphTitleEl.textContent = cfg.graphTitle;
        graphFootnoteEl.textContent = cfg.graphFootnote;

        tabBtc.classList.toggle('active', activeView === 'btc');
        tabFx.classList.toggle('active', activeView === 'fx');

        const cached = lastKnown[activeView];
        priceEl.textContent = cached == null ? '—' : cfg.format(cached);
      }

      async function fetchFromCoinbase() {
        const response = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot', { cache: 'no-store' });
        if (!response.ok) throw new Error('Coinbase HTTP ' + response.status);
        const json = await response.json();
        const amount = Number(json && json.data && json.data.amount);
        if (!Number.isFinite(amount)) throw new Error('Coinbase returned invalid price data');
        return { amount, source: 'Coinbase' };
      }

      async function fetchFromCoinGecko() {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd', { cache: 'no-store' });
        if (!response.ok) throw new Error('CoinGecko HTTP ' + response.status);
        const json = await response.json();
        const amount = Number(json && json.bitcoin && json.bitcoin.usd);
        if (!Number.isFinite(amount)) throw new Error('CoinGecko returned invalid price data');
        return { amount, source: 'CoinGecko' };
      }

      async function fetchUsdGbpPrimary() {
        const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=GBP', { cache: 'no-store' });
        if (!response.ok) throw new Error('Frankfurter HTTP ' + response.status);
        const json = await response.json();
        const amount = Number(json && json.rates && json.rates.GBP);
        if (!Number.isFinite(amount)) throw new Error('Frankfurter returned invalid rate data');
        return { amount, source: 'Frankfurter' };
      }

      async function fetchUsdGbpFallback() {
        const response = await fetch('https://open.er-api.com/v6/latest/USD', { cache: 'no-store' });
        if (!response.ok) throw new Error('ER-API HTTP ' + response.status);
        const json = await response.json();
        const amount = Number(json && json.rates && json.rates.GBP);
        if (!Number.isFinite(amount)) throw new Error('ER-API returned invalid rate data');
        return { amount, source: 'ER-API' };
      }

      async function fetchCurrentViewPrice() {
        if (activeView === 'btc') {
          try {
            return await fetchFromCoinbase();
          } catch (coinbaseError) {
            try {
              return await fetchFromCoinGecko();
            } catch (coingeckoError) {
              throw new Error(coinbaseError.message + '; fallback failed: ' + coingeckoError.message);
            }
          }
        }

        try {
          return await fetchUsdGbpPrimary();
        } catch (primaryError) {
          try {
            return await fetchUsdGbpFallback();
          } catch (fallbackError) {
            throw new Error(primaryError.message + '; fallback failed: ' + fallbackError.message);
          }
        }
      }

      function scheduleNext(ms) {
        clearTimeout(timerId);
        timerId = setTimeout(refreshPrice, ms);
      }

      function getBackoffDelay() {
        return Math.min(BASE_BACKOFF_MS * Math.pow(2, Math.max(0, retryCount - 1)), MAX_BACKOFF_MS);
      }

      async function refreshPrice() {
        if (isUpdating) return;
        isUpdating = true;

        setStatus('Updating…', 'updating');

        try {
          const result = await fetchCurrentViewPrice();
          lastKnown[activeView] = result.amount;
          priceEl.textContent = views[activeView].format(result.amount);
          sourceEl.textContent = result.source;
          updateTimestamp(new Date());

          retryCount = 0;
          setStatus('Live', 'live');
          scheduleNext(NORMAL_REFRESH_MS);
        } catch (error) {
          retryCount += 1;
          const cached = lastKnown[activeView];
          if (cached !== null) {
            priceEl.textContent = views[activeView].format(cached);
          }
          const delay = getBackoffDelay();
          setStatus('Error: ' + error.message + '. Retrying in ' + Math.round(delay / 1000) + 's', 'error');
          scheduleNext(delay);
        } finally {
          isUpdating = false;
        }
      }

      function renderTradingView() {
        if (!tradingViewReady || !window.TradingView || typeof window.TradingView.widget !== 'function') {
          return;
        }

        tvChartEl.innerHTML = '';
        new window.TradingView.widget({
          container_id: 'tvChart',
          autosize: true,
          symbol: views[activeView].tvSymbol,
          interval: '15',
          timezone: 'Etc/UTC',
          theme: 'dark',
          style: '1',
          locale: 'en',
          toolbar_bg: '#1f130c',
          enable_publishing: false,
          hide_top_toolbar: false,
          hide_legend: false,
          allow_symbol_change: false,
          withdateranges: false,
          details: false,
          hotlist: false,
          calendar: false,
          range: '1D',
          hide_volume: false,
          save_image: false,
          studies: []
        });
      }

      function initTradingViewChart() {
        const existing = document.getElementById('tradingview-widget-script');
        if (existing) {
          if (window.TradingView) {
            tradingViewReady = true;
            renderTradingView();
          }
          return;
        }

        const script = document.createElement('script');
        script.id = 'tradingview-widget-script';
        script.src = 'https://s3.tradingview.com/tv.js';
        script.async = true;
        script.onload = function () {
          tradingViewReady = true;
          renderTradingView();
        };
        script.onerror = function () {
          tvChartEl.textContent = 'Unable to load TradingView chart right now.';
          tvChartEl.style.display = 'grid';
          tvChartEl.style.placeItems = 'center';
          tvChartEl.style.color = '#f4b36b';
          tvChartEl.style.padding = '12px';
        };
        document.head.appendChild(script);
      }

      function switchView(view) {
        if (activeView === view) return;
        activeView = view;
        clearTimeout(timerId);
        retryCount = 0;
        applyViewUI();
        renderTradingView();
        refreshPrice();
      }

      tabBtc.addEventListener('click', () => switchView('btc'));
      tabFx.addEventListener('click', () => switchView('fx'));

      applyViewUI();
      initTradingViewChart();
      refreshPrice();
    })();
  </script>
</body>
</html>
